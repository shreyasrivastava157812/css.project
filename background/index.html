<!DOCTYPE html>
<html lang="en">
<head>
<style>

body {
    color: #333333;           /* dark grey text */
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 30px;
}

.card {
    background-color: rgba(0, 128, 128, 0.1);   /* faint teal tint */
    color: rgb(100, 100, 255);
    padding: 30px;
    border-radius: 10px;
    max-width: 500px;
    margin: 30px auto;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
}

.hero {
    background-image: url("https://dynamic-media-cdn.tripadvisor.com/media/photo-o/0b/5e/13/c4/chocolate-hills.jpg?w=2000&h=-1&s=1");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    color: white;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    border-radius: 10px;
    margin-bottom: 20px;
}

</style>
</head>
.=
.hero {
    border-radius: 10px;
    margin-bottom: 20px;
}

.hero h1 {
    background: rgb(245, 4, 4);
    padding: 10px 20px;
    border-radius: 5px;
}

</style>
</head>

<body>

<section class="hero">
    <h1>Welcome to My Website</h1>
</section>

<div class="card">
    <h2>Card Title</h2>
    <p>
        This card uses a faint teal background created with
        <strong>rgba()</strong> and a dark teal text color using
        <strong>hsl()</strong>.
    </p>
</div>

</body>
</html>
